<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>음수의 나눗셈</title>
    <link rel="stylesheet" href="/plusStyles.css" />
  </head>
  <body>
    <div id="app">
      <div class="page-shell">
        <div class="left-panel">
          <div class="brand-card">
            <div class="brand-badge">/</div>
            <h1>음수의 나눗셈</h1>
            <p>
              음수의 나눗셈과 관련된 학습을 진행할 수 있습니다.
              아래 메뉴를 선택하여 강의를 듣거나, 문제를 풀거나,
              학습한 내용을 정리해 보세요.
            </p>

            <div class="student-info-card">
              <div class="info-row">
                <span class="info-label">학생 아이디</span>
                <span id="studentIdText" class="info-value">불러오는 중...</span>
              </div>
              <div class="info-row">
                <span class="info-label">학습 주제</span>
                <span class="info-value">음수의 나눗셈</span>
              </div>
            </div>
          </div>
        </div>

        <div class="right-panel">
          <div class="menu-card">
            <div class="menu-header">
              <h2>학습 메뉴</h2>
              <p class="section-desc">
                아래 버튼을 눌러 원하는 학습 활동으로 이동하세요.
              </p>
            </div>

            <div class="menu-button-list">
              <button class="menu-btn" data-target="/minusvideo.html">
                동영상 강의 듣기
              </button>

              <button class="menu-btn" data-target="/minusitem.html">
                문제 풀기
              </button>

              <button class="menu-btn" data-target="/minusreflection.html">
                학습한 내용 정리하기
              </button>

              <button class="menu-btn back-btn" data-target="/stageThree.html">
                돌아가기
              </button>
            </div>

            <div id="messageBox" class="message-box"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/divmain.js"></script>
  </body>
</html>
