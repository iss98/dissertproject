<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>목표 세우기</title>
    <link rel="stylesheet" href="/goalsettingStyles.css" />

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)'], ['$', '$']],
          displayMath: [['\\[', '\\]'], ['$$', '$$']]
        },
        svg: {
          fontCache: 'global'
        }
      };
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"
    ></script>
  </head>
  <body>
    <div id="app">
      <div class="page-shell">
        <div class="left-panel">
          <div class="brand-card">
            <div class="brand-badge">GOAL</div>
            <h1>목표 세우기</h1>
            <p>
              사전검사 결과를 보고 음수의 사칙연산에 대한 자신의 이해를 점검해봅시다. <br>
              이후 오늘 학습의 목표를 설정하고 목표 달성을 위한 계획을 세워봅시다.
            </p>

            <div class="student-info-card">
              <div class="info-row">
                <span class="info-label">학생 아이디</span>
                <span id="studentIdText" class="info-value">불러오는 중...</span>
              </div>
              <div class="info-row">
                <span class="info-label">진행 단계</span>
                <span class="info-value">Stage 3</span>
              </div>
            </div>
          </div>
        </div>

        <div class="right-panel">
          <div class="goal-card">
            <div class="goal-header">
              <h2>사전검사 결과 확인</h2>
              <p class="section-desc">
                자신의 사전검사 결과를 확인하고 오늘의 학습 목표를 작성해 주세요.
              </p>
            </div>

            <div id="loadingBox" class="loading-box">기록을 불러오는 중...</div>

            <div id="contentArea" class="hidden">
              <div class="summary-card">
                <div class="summary-title">사전검사 요약</div>
                <div id="scoreSummary" class="summary-score"></div>
              </div>

              <div class="wrong-card">
                <div class="wrong-title">틀린 문제 리스트</div>
                <div id="wrongList" class="wrong-list"></div>
              </div>

              <form id="goalForm" class="goal-form">
                <div class="input-group">
                  <label for="plusInput" class="input-label">
                    1. 음수의 덧셈을 정확히 이해하고 관련된 문제를 풀 수 있나요?
                  </label>
                  <textarea
                    id="plusInput"
                    class="goal-input short-input"
                    rows="3"
                    placeholder="예: 같은 부호의 덧셈은 잘할 수 있지만, 다른 부호의 덧셈은 아직 헷갈립니다."
                    required
                  ></textarea>
                </div>

                <div class="input-group">
                  <label for="minusInput" class="input-label">
                    2. 음수의 뺄셈을 정확히 이해하고 관련된 문제를 풀 수 있나요?
                  </label>
                  <textarea
                    id="minusInput"
                    class="goal-input short-input"
                    rows="3"
                    placeholder="예: 뺄셈을 덧셈으로 바꾸는 것은 알지만, 계산 실수가 가끔 있습니다."
                    required
                  ></textarea>
                </div>

                <div class="input-group">
                  <label for="mulInput" class="input-label">
                    3. 음수의 곱셈을 정확히 이해하고 관련된 문제를 풀 수 있나요?
                  </label>
                  <textarea
                    id="mulInput"
                    class="goal-input short-input"
                    rows="3"
                    placeholder="예: 음수와 양수를 곱할 때 부호를 자주 헷갈립니다."
                    required
                  ></textarea>
                </div>

                <div class="input-group">
                  <label for="divInput" class="input-label">
                    4. 음수의 나눗셈을 정확히 이해하고 관련된 문제를 풀 수 있나요?
                  </label>
                  <textarea
                    id="divInput"
                    class="goal-input short-input"
                    rows="3"
                    placeholder="예: 나눗셈도 곱셈과 같은 부호 규칙이라는 점을 더 연습해야 합니다."
                    required
                  ></textarea>
                </div>

                <div class="input-group">
                  <label for="goalInput" class="input-label">
                    5. 오늘의 학습 목표를 세우고 학습 목표 달성을 위한 공부 계획을 작성해보세요.
                  </label>
                  <textarea
                    id="goalInput"
                    class="goal-input"
                    rows="6"
                    placeholder="예: 오늘은 음수의 사칙연산 부호 규칙을 정확히 이해하고, 틀린 문제를 다시 풀어보며 연습하겠습니다."
                    required
                  ></textarea>
                </div>

                <button type="submit" class="primary-btn">목표 저장</button>
              </form>
            </div>

            <div id="messageBox" class="message-box"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/goalsettingmain.js"></script>
  </body>
</html>
