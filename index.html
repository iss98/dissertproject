<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Learning Portal</title>
    <link rel="stylesheet" href="/indexStyles.css" />
  </head>
  <body>
    <div id="app">
      <div class="page-shell">
        <div class="left-panel">
          <div class="brand-card">
            <div class="brand-badge">AI</div>
            <h1>Student Learning Portal</h1>
            <p>
              학생 로그인을 통해 학습 시스템에 접속하고,
              관리자 인증 후 학생 계정을 생성할 수 있습니다.
            </p>
          </div>
        </div>

        <div class="right-panel">
          <div class="auth-card">
            <div class="tab-header">
              <button id="loginTab" class="tab-btn active">학생 로그인</button>
              <button id="registerTab" class="tab-btn">학생 계정 만들기</button>
            </div>

            <section id="loginSection" class="section active">
              <h2>학생 로그인</h2>
              <p class="section-desc">아이디와 비밀번호를 입력해 로그인하세요.</p>

              <form id="loginForm" class="form-grid">
                <div class="input-group full-width">
                  <label for="loginId">아이디</label>
                  <input
                    type="text"
                    id="loginId"
                    name="loginId"
                    placeholder="예: KS0101"
                    required
                  />
                </div>

                <div class="input-group full-width">
                  <label for="loginPassword">비밀번호</label>
                  <input
                    type="password"
                    id="loginPassword"
                    name="loginPassword"
                    placeholder="비밀번호 입력"
                    required
                  />
                </div>

                <button type="submit" class="primary-btn">로그인</button>
              </form>
            </section>

            <section id="registerSection" class="section">
              <h2>학생 계정 만들기</h2>
              <p class="section-desc">
                학교 이니셜, 반, 번호 범위를 지정하고 관리자 비밀번호를 입력하세요.
              </p>

              <form id="createAccountsForm" class="form-grid">
                <div class="input-group">
                  <label for="schoolInitial">학교 이니셜</label>
                  <input
                    type="text"
                    id="schoolInitial"
                    name="schoolInitial"
                    placeholder="예: KS"
                    maxlength="10"
                    required
                  />
                </div>

                <div class="input-group">
                  <label for="classNumber">반</label>
                  <input
                    type="number"
                    id="classNumber"
                    name="classNumber"
                    min="1"
                    max="99"
                    placeholder="예: 1"
                    required
                  />
                </div>

                <div class="input-group">
                  <label for="startNumber">시작 번호</label>
                  <input
                    type="number"
                    id="startNumber"
                    name="startNumber"
                    min="1"
                    max="99"
                    placeholder="예: 1"
                    required
                  />
                </div>

                <div class="input-group">
                  <label for="endNumber">끝 번호</label>
                  <input
                    type="number"
                    id="endNumber"
                    name="endNumber"
                    min="1"
                    max="99"
                    placeholder="예: 10"
                    required
                  />
                </div>

                <div class="input-group full-width">
                  <label>실험 그룹</label>

                  <div style="display:flex; gap:20px; margin-top:6px;">
                    <label style="display:flex; align-items:center; gap:6px;">
                      <input type="radio" name="experiment" value="help" required />
                      도움기능 있음
                    </label>

                    <label style="display:flex; align-items:center; gap:6px;">
                      <input type="radio" name="experiment" value="nohelp" />
                      도움기능 없음
                    </label>
                  </div>
                </div>

                <div class="input-group full-width">
                  <label for="managerPassword">매니저 비밀번호</label>
                  <input
                    type="password"
                    id="managerPassword"
                    name="managerPassword"
                    placeholder="관리자 인증 비밀번호"
                    required
                  />
                </div>

                <button type="submit" class="primary-btn">학생 계정 생성</button>
              </form>

              <div id="previewBox" class="preview-box"></div>
            </section>

            <div id="messageBox" class="message-box"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
